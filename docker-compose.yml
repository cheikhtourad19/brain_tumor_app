services:
  brain-tumor-app:
    platform: linux/arm64
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: brain-tumor-detector
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/models/cnn_baseline.keras
      - BREAST_MODEL_PATH=/app/models/baseline_tumor_model.keras
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - brain-tumor-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  breast-tumor-service:
    platform: linux/arm64
    build:
      context: ./breast_service
      dockerfile: Dockerfile
    container_name: breast-tumor-detector
    ports:
      - "8081:8081"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - BREAST_MODEL_PATH=/app/models/baseline_tumor_model.keras
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - brain-tumor-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  brain-tumor-network:
    driver: bridge
